name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch / PR when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal GITHUB_TOKEN scope. All jobs are read-only — they only checkout
# code and run tests/lint; nothing comments back, pushes, or publishes.
permissions:
  contents: read

env:
  GO_VERSION: '1.25.x'

jobs:
  # Static analysis: govet + staticcheck + the rest of golangci-lint's
  # default-enabled linters. Linux-only because the linter is platform-
  # neutral; running on macOS in addition wouldn't catch anything new.
  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: golangci-lint
        # @v9 runs on Node 24 (v7/v8 were Node 20) and requires
        # golangci-lint >= v2.1.0 — `version: latest` (v2.x, built against
        # current Go) satisfies that. @v6 capped at v1.64.8 (Go 1.24) and
        # failed with "Go 1.24 < 1.25 target"; v2 is the line we need.
        uses: golangci/golangci-lint-action@v9
        with:
          # `latest` resolves to whatever's current at run time. Pinning
          # to a specific version becomes a maintenance liability — every
          # Go release bumps the minimum golangci-lint version that can
          # parse it. `latest` is the right default for a project that
          # tracks current Go. v2.x has a different config format than
          # v1.x but with no .golangci.yml in repo, defaults work for both.
          version: latest
          # Defaults: govet, ineffassign, staticcheck, errcheck, unused.
          args: --timeout=5m

  # Unit tests on Linux + macOS to catch platform-specific code paths
  # (e.g. fs.ModeSymlink handling, exec.LookPath behavior with Calibre).
  # Tests are hermetic — no PostgreSQL service container needed; the
  # internal/database package tests model structs, not actual SQL.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -timeout 5m ./...

  # Build sanity check: confirm both CLI binaries (`sopds` and
  # `sopds-tts`) link cleanly on each target platform. This catches
  # build-tag / CGo issues that pure-Go tests don't.
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: build sopds
        run: go build -v -o sopds ./cmd/sopds

      - name: build sopds-tts
        run: go build -v -o sopds-tts ./cmd/sopds-tts

      - name: build zipdupes
        run: go build -v -o zipdupes ./cmd/zipdupes
