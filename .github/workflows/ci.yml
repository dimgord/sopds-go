name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch / PR when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal GITHUB_TOKEN scope. All jobs are read-only — they only checkout
# code and run tests/lint; nothing comments back, pushes, or publishes.
permissions:
  contents: read

env:
  GO_VERSION: '1.24.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Static analysis: govet + staticcheck + the rest of golangci-lint's
  # default-enabled linters. Linux-only because the linter is platform-
  # neutral; running on macOS in addition wouldn't catch anything new.
  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          # Defaults: govet, ineffassign, staticcheck, errcheck, unused.
          # No .golangci.yml in repo (yet) — use the action's defaults.
          args: --timeout=5m

  # Unit tests on Linux + macOS to catch platform-specific code paths
  # (e.g. fs.ModeSymlink handling, exec.LookPath behavior with Calibre).
  # Tests are hermetic — no PostgreSQL service container needed; the
  # internal/database package tests model structs, not actual SQL.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -timeout 5m ./...

  # Build sanity check: confirm both CLI binaries (`sopds` and
  # `sopds-tts`) link cleanly on each target platform. This catches
  # build-tag / CGo issues that pure-Go tests don't.
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: build sopds
        run: go build -v -o sopds ./cmd/sopds

      - name: build sopds-tts
        run: go build -v -o sopds-tts ./cmd/sopds-tts

      - name: build zipdupes
        run: go build -v -o zipdupes ./cmd/zipdupes
