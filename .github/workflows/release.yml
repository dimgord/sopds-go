name: Release

# Triggered by pushing a `v*` tag (e.g. `v1.2.0`, `v1.2.0-rc1`, `v1.3.0-beta`).
# GoReleaser builds linux/darwin × amd64/arm64 archives and creates a
# GitHub Release with auto-generated changelog.
#
# Pre-release detection: tags containing `-rc`, `-beta`, `-alpha` are
# automatically marked as pre-release (see `release.prerelease: auto`
# in .goreleaser.yaml).
#
# Manual trigger via `workflow_dispatch` lets you re-run on an existing
# tag without re-pushing it (useful for transient CI failures).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to rebuild
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# `contents: write` lets GoReleaser create the GitHub Release;
# `packages: write` lets it push to ghcr.io/dimgord/sopds-go.
permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          # GoReleaser uses git history for the changelog — fetch all.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
          cache-dependency-path: go.sum

      # QEMU lets the amd64 GitHub runner build the linux/arm64 image.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Buildx is required for `--platform` flag and manifest lists.
      - uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry. Uses the auto-provided
      # GITHUB_TOKEN scoped via `permissions.packages: write` above —
      # no PAT needed.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT (or fine-grained token) with `contents: write` on
          # dimgord/homebrew-tap so GoReleaser's `brews:` step can push
          # the formula update commit. Set as a repo Secret manually:
          #   gh secret set HOMEBREW_TAP_GITHUB_TOKEN --repo dimgord/sopds-go
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
