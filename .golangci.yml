# golangci-lint v2.x config — see https://golangci-lint.run/usage/configuration/
#
# golangci-lint v2.x config — see https://golangci-lint.run/usage/configuration/
#
# Lean linter set for an initial green-CI baseline:
#   govet         — compiler-style checks (printf format, unkeyed structs, locks)
#   ineffassign   — flags assignments that are never read
#   unused        — dead code (functions, types, vars, struct fields)
#   misspell      — English typos in comments/strings (useful for OSS docs)
#
# Intentionally OFF for this baseline:
#   errcheck      — too noisy without case-by-case excludes (Close/Remove
#                   in cleanup paths, bytes.Buffer.Write which never errors).
#                   Re-enable when worth the ~50 specific excludes.
#   staticcheck   — surfaces real findings (e.g. SA1029 "string as ctx key")
#                   alongside style suggestions (S1xxx, QF1xxx, ST1xxx) and
#                   test-file false positives (SA5011, SA9003). The repo
#                   has ~25 reports across these — incremental cleanup is
#                   the right path. Re-enable in a future Rev with the
#                   specific check classes excluded that don't apply here.
#
# Re-adding staticcheck later — recommended config skeleton:
#
#   linters:
#     enable:
#       - staticcheck
#     settings:
#       staticcheck:
#         checks:
#           - all
#           - -S1016    # struct literal vs. type conversion (style)
#           - -QF1008   # embedded field selector simplification (style)
#           - -QF1012   # Fprintf vs WriteString(Sprintf) (style)
#           - -ST1023   # omit inferred type from declaration (style)
#           - -SA5011   # possible nil deref — false positives in tests
#           - -SA9003   # empty branches — often TODO test stubs

version: "2"

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - unused
    - misspell

run:
  timeout: 5m
