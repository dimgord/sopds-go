# GoReleaser config — https://goreleaser.com
# Run locally: `goreleaser release --snapshot --clean` to test without publishing.
# Triggered by .github/workflows/release.yml on `v*` tag push.

version: 2

project_name: sopds-go

before:
  hooks:
    - go mod tidy

builds:
  # Main OPDS server + library manager CLI.
  - id: sopds
    main: ./cmd/sopds
    binary: sopds
    env:
      - CGO_ENABLED=0   # static binaries — no glibc dependency
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath        # reproducible builds — remove local path info
    ldflags:
      - -s -w            # strip symbols + DWARF debug info
      - -X main.version={{ .Version }}

  # TTS subprocess (Go path; CUDA-accelerated alternative is sopds-tts-rs/).
  - id: sopds-tts
    main: ./cmd/sopds-tts
    binary: sopds-tts
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w

  # FB2-archive duplicate finder (Rust port: zipdupes-rs/).
  - id: zipdupes
    main: ./cmd/zipdupes
    binary: zipdupes
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: default
    ids: [sopds, sopds-tts, zipdupes]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - LICENSE
      - NOTICE.md
      - README.md
      - PROGRESS.md
      - config.yaml.example
      - init.sql

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Docker images — multi-arch (linux/amd64 + linux/arm64) published to
# GitHub Container Registry. Each arch builds separately (so GoReleaser
# can copy the right binary into context), then a manifest list aliases
# them under a single tag.
#
# Login is handled by .github/workflows/release.yml's docker/login-action
# step before goreleaser runs.
dockers:
  - image_templates:
      - "ghcr.io/dimgord/sopds-go:{{ .Version }}-amd64"
      - "ghcr.io/dimgord/sopds-go:latest-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    extra_files:
      - config.yaml.example
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.description=Self-hosted OPDS catalog server"
      - "--label=org.opencontainers.image.url=https://github.com/dimgord/sopds-go"
      - "--label=org.opencontainers.image.source=https://github.com/dimgord/sopds-go"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.licenses=AGPL-3.0"

  - image_templates:
      - "ghcr.io/dimgord/sopds-go:{{ .Version }}-arm64"
      - "ghcr.io/dimgord/sopds-go:latest-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    extra_files:
      - config.yaml.example
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.description=Self-hosted OPDS catalog server"
      - "--label=org.opencontainers.image.url=https://github.com/dimgord/sopds-go"
      - "--label=org.opencontainers.image.source=https://github.com/dimgord/sopds-go"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.licenses=AGPL-3.0"

docker_manifests:
  - name_template: "ghcr.io/dimgord/sopds-go:{{ .Version }}"
    image_templates:
      - "ghcr.io/dimgord/sopds-go:{{ .Version }}-amd64"
      - "ghcr.io/dimgord/sopds-go:{{ .Version }}-arm64"
  - name_template: "ghcr.io/dimgord/sopds-go:latest"
    image_templates:
      - "ghcr.io/dimgord/sopds-go:latest-amd64"
      - "ghcr.io/dimgord/sopds-go:latest-arm64"

# Homebrew formula auto-update — on each tag, GoReleaser opens a commit
# to dimgord/homebrew-tap updating Formula/sopds-go.rb with the new
# release archive URL + SHA256. Users:  brew tap dimgord/tap &&
# brew install sopds-go.
#
# Auth: HOMEBREW_TAP_GITHUB_TOKEN is a PAT (or fine-grained token) with
# `contents: write` on dimgord/homebrew-tap, set as a repo Secret in
# dimgord/sopds-go's settings.
brews:
  - name: sopds-go
    repository:
      owner: dimgord
      name: homebrew-tap
      branch: master
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/dimgord/sopds-go"
    description: "Self-hosted OPDS catalog server (Go rewrite of SOPDS)"
    license: "AGPL-3.0"
    commit_author:
      name: dimgord-bot
      email: dimgord+bot@users.noreply.github.com
    commit_msg_template: "Brew formula update for sopds-go {{ .Tag }}"

    # Three binaries plus the example config + init.sql land in the cellar.
    install: |
      bin.install "sopds"
      bin.install "sopds-tts"
      bin.install "zipdupes"
      pkgshare.install "config.yaml.example"
      pkgshare.install "init.sql"

    # Smoke test — run by `brew test sopds-go`. The version subcmd hits
    # the version-injection ldflags wired in Rev 58, so a successful
    # exit confirms the binary is link-clean and version metadata sane.
    # Note: some setupLogging warnings on stderr are non-fatal — test
    # checks only that the command runs and exits 0.
    test: |
      system "#{bin}/sopds", "version"

    # Optional deps — `brew install --with-postgresql sopds-go` would
    # work but Homebrew dropped --with-* flags in 2019. Keep this as
    # documentation; install postgres separately or via brew services.
    dependencies:
      - name: postgresql@16
        type: recommended

    # Caveats shown after `brew install`. Reminds users about the
    # external runtime deps that aren't installable via brew.
    caveats: |
      sopds-go is now installed. To complete setup:

        1. Start PostgreSQL: brew services start postgresql@16
        2. Initialize the database:
             psql -U postgres -f #{pkgshare}/init.sql
        3. Create config: sopds init
        4. Edit config.yaml.example as a starting template:
             cat #{pkgshare}/config.yaml.example
        5. Run migrations: sopds migrate
        6. Start: sopds start

      Optional runtime deps (install separately):
        - calibre        — for FB2 → MOBI conversion (`brew install calibre`)
        - espeak-ng      — for IPA-based Piper TTS voices (`brew install espeak-ng`)

      For CUDA-accelerated TTS (NVIDIA GPU only), see sopds-tts-rs/ in the
      upstream repo: https://github.com/dimgord/sopds-go/tree/main/sopds-tts-rs

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'typo'
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?(fix|bugfix)(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: dimgord
    name: sopds-go
  prerelease: auto    # tags with -rc/-beta/-alpha auto-marked prerelease
  draft: false
  header: |
    ## sopds-go {{ .Tag }}

    Self-hosted OPDS catalog server. See [README](https://github.com/dimgord/sopds-go/blob/main/README.md) for setup, [PROGRESS.md](https://github.com/dimgord/sopds-go/blob/main/PROGRESS.md) for the per-revision log.
  footer: |
    ---

    **Verification**: `sha256sum -c checksums.txt` against the downloaded archive.

    **Quick install** (Linux x86_64):
    ```bash
    curl -LO https://github.com/dimgord/sopds-go/releases/download/{{ .Tag }}/sopds-go_{{ trimprefix .Tag "v" }}_linux_x86_64.tar.gz
    tar xzf sopds-go_{{ trimprefix .Tag "v" }}_linux_x86_64.tar.gz
    sudo install sopds /usr/local/bin/
    ```

    **License**: AGPL-3.0 — see [LICENSE](https://github.com/dimgord/sopds-go/blob/main/LICENSE).
