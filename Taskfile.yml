version: '3'

vars:
  BINARY: sopds
  BUILD_DIR: .
  CONFIG: config.yaml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build all binaries (sopds and sopds-tts)
    cmds:
      - go build -o {{.BINARY}} ./cmd/sopds
      - go build -o sopds-tts ./cmd/sopds-tts
    sources:
      - "**/*.go"
    generates:
      - "{{.BINARY}}"
      - "sopds-tts"

  init:
    desc: Create default config.yaml
    cmds:
      - ./{{.BINARY}} init
    deps: [build]

  migrate:
    desc: Run database migrations
    cmds:
      - ./{{.BINARY}} migrate
    deps: [build]

  start:
    desc: Start the server (foreground)
    cmds:
      - ./{{.BINARY}} start
    deps: [build]

  stop:
    desc: Stop the running server
    cmds:
      - ./{{.BINARY}} stop

  status:
    desc: Check server status
    cmds:
      - ./{{.BINARY}} status

  restart:
    desc: Restart the server
    cmds:
      - task: stop
      - task: start

  scan:
    desc: Run manual library scan
    cmds:
      - ./{{.BINARY}} scan
    deps: [build]

  # Systemd service management
  service-start:
    desc: Start sopds systemd service
    cmds:
      - sudo systemctl start sopds.service

  service-stop:
    desc: Stop sopds systemd service
    cmds:
      - sudo systemctl stop sopds.service

  service-restart:
    desc: Restart sopds systemd service
    cmds:
      - sudo systemctl restart sopds.service

  service-status:
    desc: Check sopds systemd service status
    cmds:
      - sudo systemctl status sopds.service

  service-logs:
    desc: View sopds service logs
    cmds:
      - sudo journalctl -u sopds.service -f

  # Database operations
  db-backup:
    desc: Backup PostgreSQL database
    vars:
      TIMESTAMP:
        sh: date +%Y%m%d_%H%M%S
    cmds:
      - pg_dump -U sopds -h localhost -Fc sopds > sopds_{{.TIMESTAMP}}.dump
      - echo "Backup saved to sopds_{{.TIMESTAMP}}.dump"

  db-restore:
    desc: Restore PostgreSQL database from backup (usage - task db-restore FILE=backup.dump)
    cmds:
      - pg_restore -U sopds -h localhost -d sopds -c {{.FILE}}

  db-vacuum:
    desc: Run VACUUM ANALYZE on database
    cmds:
      - PGPASSWORD=sopds psql -U sopds -h localhost -d sopds -c "VACUUM ANALYZE;"

  db-stats:
    desc: Show database table statistics
    cmds:
      - |
        PGPASSWORD=sopds psql -U sopds -h localhost -d sopds -c "
        SELECT relname, n_live_tup, n_dead_tup, last_vacuum, last_autovacuum,
               pg_size_pretty(pg_table_size(relid)) as size
        FROM pg_stat_user_tables ORDER BY n_dead_tup DESC;"

  # Duplicate detection
  dupes:
    desc: Run duplicate detection on library
    cmds:
      - ./{{.BINARY}} scan
    deps: [build]

  dupes-clear:
    desc: Clear all duplicate marks
    cmds:
      - PGPASSWORD=sopds psql -U sopds -h localhost -d sopds -c "UPDATE books SET duplicate_of = NULL;"
      - echo "Cleared all duplicate marks"

  # Development
  dev:
    desc: Build and start in development mode
    cmds:
      - task: build
      - ./{{.BINARY}} start

  test:
    desc: Run tests
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  lint:
    desc: Run all linters
    cmds:
      - task: vet
      - task: fmt

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}}
      - rm -f sopds-tts
      - rm -f *.dump
      - rm -f *.log

  # MySQL import
  import-mysql:
    desc: Import from MySQL (usage - task import-mysql MYSQL_HOST=localhost MYSQL_USER=sopds MYSQL_PASS=sopds MYSQL_DB=sopds)
    vars:
      MYSQL_HOST: '{{.MYSQL_HOST | default "localhost"}}'
      MYSQL_PORT: '{{.MYSQL_PORT | default "3306"}}'
      MYSQL_USER: '{{.MYSQL_USER | default "sopds"}}'
      MYSQL_PASS: '{{.MYSQL_PASS | default "sopds"}}'
      MYSQL_DB: '{{.MYSQL_DB | default "sopds"}}'
    cmds:
      - ./{{.BINARY}} import-mysql --mysql-host={{.MYSQL_HOST}} --mysql-port={{.MYSQL_PORT}} --mysql-user={{.MYSQL_USER}} --mysql-pass={{.MYSQL_PASS}} --mysql-db={{.MYSQL_DB}}
    deps: [build]

  version:
    desc: Show version
    cmds:
      - ./{{.BINARY}} version
    deps: [build]
