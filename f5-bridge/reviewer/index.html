<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F5 stress reviewer</title>
<style>
  :root{
    --paper:#f4efe4; --ink:#22201b; --muted:#8a8272; --rule:#ded5c2;
    --accent:#7a1f12; --accent-soft:#c8452e; --flag:#b3311c; --flag-bg:#f6dcd2;
    --edit:#2b4a6f; --dirty:#c98a1a; --panel:#faf6ec;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);
    font:16px/1.6 "Iowan Old Style","PT Serif",Georgia,"Times New Roman",serif;
    display:grid;grid-template-columns:248px 1fr;grid-template-rows:100%;height:100vh}

  /* ---- sidebar: the chapters, like a table of contents ---- */
  aside{background:var(--panel);border-right:1px solid var(--rule);overflow:auto;padding:0}
  aside h1{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    font-weight:600;margin:0;padding:18px 18px 10px}
  .chap{padding:9px 18px;border-top:1px solid var(--rule);cursor:pointer;display:flex;gap:10px;align-items:baseline}
  .chap:hover{background:#f0e9d8}
  .chap.on{background:#ece2cc;box-shadow:inset 3px 0 0 var(--accent)}
  .chap .nn{font-variant-numeric:tabular-nums;color:var(--accent);font-weight:700;min-width:1.4em}
  .chap .ti{flex:1;font-size:14px}
  .chap .dot{width:7px;height:7px;border-radius:50%;background:var(--dirty);align-self:center;visibility:hidden}
  .chap.dirty .dot{visibility:visible}

  /* ---- main pane ---- */
  main{overflow:auto;display:flex;flex-direction:column}
  header{position:sticky;top:0;z-index:5;background:var(--paper);border-bottom:1px solid var(--rule);
    padding:14px 26px;display:flex;align-items:center;gap:16px}
  header .title{font-size:20px;font-weight:700;flex:1}
  header .stat{color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums}
  button{font:inherit;font-size:14px;border:1px solid var(--rule);background:#fff;color:var(--ink);
    padding:6px 14px;border-radius:6px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button:disabled{opacity:.4;cursor:default}
  kbd{font:12px ui-monospace,monospace;background:#eee3cc;border:1px solid var(--rule);border-radius:4px;padding:0 5px}

  .rows{padding:14px 26px 40vh;max-width:1180px}
  .row{display:grid;grid-template-columns:2.4em 1fr 1fr;gap:18px;padding:5px 0;align-items:start;
    border-bottom:1px solid #efe8d8}
  .row .ix{color:var(--muted);font:12px ui-monospace,monospace;text-align:right;padding-top:4px;
    font-variant-numeric:tabular-nums}
  .raw{color:var(--muted)}
  .ed{outline:none;border-radius:5px;padding:2px 7px;margin:-2px -7px;white-space:pre-wrap}
  .ed:focus{background:#fff;box-shadow:0 0 0 2px var(--edit)}
  .row.changed .ed{box-shadow:inset 3px 0 0 var(--dirty)}
  .row.changed.focus .ed{box-shadow:inset 3px 0 0 var(--dirty),0 0 0 2px var(--edit)}
  .row.current{background:#efe7d3;border-radius:6px}                 /* browse cursor (not editing) */
  .row.current .ed{box-shadow:inset 3px 0 0 var(--edit)}
  .row.done mark.hom, .row.done mark.nostress{background:none;color:inherit;box-shadow:none;opacity:.55}
  .row.done .ix::after{content:" ✓";color:#2e7d32}                  /* flag marked valid — skipped in nav */
  .row.note{opacity:.86}
  .row.note .raw::before{content:"✎ ";color:var(--accent-soft)}
  mark.hom{background:var(--flag-bg);color:var(--flag);border-radius:3px;padding:0 2px;
    box-shadow:inset 0 -2px 0 var(--flag)}
  mark.nostress{background:#f4e6c4;color:#7a5a12;border-radius:3px;padding:0 2px;  /* RUAccent skipped it */
    box-shadow:inset 0 -2px 0 #c98a1a}
  .soft{box-shadow:inset 0 -1px 0 var(--rule)}  /* frequent near-always-ё (всё, чём…): shown, not counted */
  .empty{color:var(--muted);padding:60px 26px;font-style:italic}
</style>
</head>
<body>
<aside><h1>Главы</h1><div id="chaps"></div></aside>
<main>
  <header>
    <span class="title" id="title">—</span>
    <span class="stat" id="stat"></span>
    <button id="prev" title="предыдущий флаг — p">↑ <kbd>p</kbd></button>
    <button id="next" title="следующий флаг — n">↓ <kbd>n</kbd></button>
    <button id="ok" title="пометить проверенным и дальше — v / пробел">✓ <kbd>v</kbd></button>
    <button id="save" class="primary" title="сохранить — ⌘/Ctrl+S" disabled>Сохранить</button>
  </header>
  <div class="rows" id="rows"><div class="empty">Выберите главу слева.</div></div>
</main>

<script>
const $ = s => document.querySelector(s);

// --- caret helpers for a single-text-node contenteditable line ---
function caretOffset(el){
  const s=window.getSelection(); if(!s.rangeCount) return null;
  const r=s.getRangeAt(0), pre=r.cloneRange();
  pre.selectNodeContents(el); pre.setEnd(r.endContainer,r.endOffset);
  return pre.toString().length;
}
function setCaret(el,off){
  const len=(el.textContent||"").length; off=Math.max(0,Math.min(off,len));
  const r=document.createRange();
  if(el.firstChild) r.setStart(el.firstChild,off); else r.setStart(el,0);
  r.collapse(true);
  const s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
}
// lazy stress: one '+' per stress-unit — when a new '+' is typed, drop that unit's previous '+'.
// Unit boundary is whitespace OR '-', so a hyphen compound keeps a stress per part
// (когд+а-ниб+удь, бл+едно-зелёный) instead of one part clobbering the other.
function dedupePlus(el){
  const text=el.textContent, caret=caretOffset(el);
  if(caret==null || caret<1 || text[caret-1]!=="+") return;
  let a=caret-1; while(a>0 && !/[\s-]/.test(text[a-1])) a--;      // unit start
  let b=caret;   while(b<text.length && !/[\s-]/.test(text[b])) b++; // unit end
  const word=text.slice(a,b);
  if((word.match(/\+/g)||[]).length<2) return;                 // only one '+' → nothing to do
  const keep=(caret-1)-a;                                       // keep the just-typed '+'
  let nw="", removedBefore=0;
  for(let i=0;i<word.length;i++){
    if(word[i]==="+" && i!==keep){ if(i<keep) removedBefore++; continue; }
    nw+=word[i];
  }
  el.textContent=text.slice(0,a)+nw+text.slice(b);
  setCaret(el, caret-removedBefore);
}
let HOM = new Set();          // ё-folded lemmas of ambiguous ё/stress homographs (for ё flags)
let OMO = new Set();          // stress-homograph words present in the book (после/один/руки…)
let UNK = new Set();          // polysyllables absent from accents.json, left unstressed (names/rare)
let cur = null;               // {name, title, raw:[], stressed:[], dirty:Set}
let navLine = -1;             // line index the flag-navigation cursor is parked on
let checked = new Set();      // line indices marked "проверено" — skipped in nav (persisted per file)
const dirtyFiles = new Set();
const chkKey = () => "f5chk_" + (cur ? cur.name : "");
const saveChecked = () => localStorage.setItem(chkKey(), JSON.stringify([...checked]));

const VOW = "аеёиоуыэюяАЕЁИОУЫЭЮЯ";
const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const trimPunct = s => s.replace(/^[«»"'([{.,!?;:—\-–…]+|[«»"')\]}.,!?;:—\-–…]+$/g,"");
// frequent ё-forms (ё-folded lemma) RUAccent almost always gets right — shown subtly, not counted,
// so the 'hard' flags are the rarer genuinely-ambiguous homographs (нёбо, колёса, самоё, берёте…).
const COMMON = new Set(["все","всем","чем","нем","ее","еще","мое","твое","свое","чье","нее","чьем"]);

// classify a token via RUAccent's own dicts (sets from the sidecars) → per hyphen-segment so
// compounds keep a stress each (когд+а-ниб+удь). Priority hom > nostress > soft.
//   "hom"      rare ambiguous ё-homograph (red, counted)
//   "nostress" a part left unstressed that's an omograph miss OR absent from accents.json — a genuine
//              skip F5 will botch (amber, counted)
//   "soft"     frequent ё (всё/чём) or a stress-homograph RUAccent already chose (после/один) — a
//              subtle glance mark, not counted
function classify(tok){
  let worst = null;
  for(const seg of tok.split("-")){
    const hasPlus = seg.includes("+");
    const base = trimPunct(seg.replace(/\+/g,"").toLowerCase());
    if(!base) continue;
    let c = null;
    if(base.includes("ё")){                                   // ё carries the stress
      const lemma = base.replace(/ё/g,"е");
      c = HOM.has(lemma) ? (COMMON.has(lemma) ? "soft" : "hom") : null;
    } else if(hasPlus){
      c = OMO.has(base) ? "soft" : null;                      // RUAccent chose a homograph stress → glance
    } else if(OMO.has(base) || UNK.has(base)){
      c = "nostress";                                         // unstressed omograph miss or unknown word
    }
    if(c==="hom") return "hom";
    if(c==="nostress") worst = "nostress";
    else if(c==="soft" && worst!=="nostress") worst = "soft";
  }
  return worst;
}
// display: '+' before a vowel → real acute accent; mark flagged tokens by class
function render(line){
  return line.split(/(\s+)/).map(t=>{
    if(/^\s+$/.test(t) || t==="") return esc(t);
    const disp = esc(t).replace(new RegExp("\\+(["+VOW+"])","g"),"$1́");
    const c = classify(t);
    return c==="hom" ? `<mark class="hom">${disp}</mark>`
         : c==="nostress" ? `<mark class="nostress">${disp}</mark>`
         : c==="soft" ? `<span class="soft">${disp}</span>` : disp;
  }).join("");
}
function lineHasFlag(line){ return line.split(/\s+/).some(t=>{const c=classify(t);return c==="hom"||c==="nostress";}); }

async function loadList(){
  const d = await (await fetch("/api/list")).json();
  const S = a => new Set((a||[]).map(w=>w.trim().toLowerCase()).filter(Boolean));
  HOM = S(d.homographs); OMO = S(d.omographs); UNK = S(d.unknown);
  const box = $("#chaps"); box.innerHTML="";
  d.files.forEach(f=>{
    const el = document.createElement("div");
    el.className="chap"; el.dataset.name=f.nn+"_"+f.safe;
    el.innerHTML=`<span class="nn">${f.nn}</span><span class="ti">${esc(f.title)}</span><span class="dot"></span>`;
    el.onclick=()=>openFile(f.nn+"_"+f.safe, f.title, el);
    box.appendChild(el);
  });
}

async function openFile(name, title, el){
  if(cur && cur.dirty.size && !confirm("Несохранённые правки в текущей главе. Перейти и потерять их?")) return;
  document.querySelectorAll(".chap.on").forEach(c=>c.classList.remove("on"));
  el?.classList.add("on");
  const d = await (await fetch("/api/file?name="+encodeURIComponent(name))).json();
  cur = {name, title, raw:d.raw||[], stressed:d.stressed||[], dirty:new Set()};
  navLine = -1;
  checked = new Set(JSON.parse(localStorage.getItem(chkKey())||"[]"));
  $("#title").textContent = title;
  renderRows();
  updateStat();
  $("#rows").scrollIntoView();
}

function renderRows(){
  const n = Math.max(cur.raw.length, cur.stressed.length);
  const rows = $("#rows"); rows.innerHTML="";
  for(let i=0;i<n;i++){
    const raw = cur.raw[i]||"", str = cur.stressed[i]||"";
    const row = document.createElement("div");
    row.className = "row" + (/^\s*Примечание\./.test(raw)?" note":"") + (checked.has(i)?" done":"");
    row.dataset.i = i;
    const ed = `<div class="ed" contenteditable="true" spellcheck="false" data-i="${i}">${render(str)}</div>`;
    row.innerHTML = `<div class="ix">${i+1}</div><div class="raw">${esc(raw)}</div>${ed}`;
    rows.appendChild(row);
  }
  rows.querySelectorAll(".ed").forEach(ed=>{
    ed.addEventListener("focus",()=>{
      ed.dataset.touched="";                                 // fresh focus — no edit yet
      ed.textContent = cur.stressed[+ed.dataset.i];
      ed.closest(".row").classList.add("focus");
      if(lineHasFlag(cur.stressed[+ed.dataset.i])) setCurrent(+ed.dataset.i);  // clicking a flag re-anchors nav
    });
    ed.addEventListener("input",()=>{ ed.dataset.touched="1"; dedupePlus(ed); });
    ed.addEventListener("blur",()=>{
      const i=+ed.dataset.i;
      ed.closest(".row").classList.remove("focus");
      if(ed.dataset.touched){                                // only a real edit dirties — nav/focus never does
        const v=ed.textContent.replace(/ /g," ").replace(/[ \t\n]+/g," ").trim();
        if(v!==cur.stressed[i]){ cur.stressed[i]=v; cur.dirty.add(i); ed.closest(".row").classList.add("changed"); }
      }
      ed.innerHTML = render(cur.stressed[i]); updateStat();
    });
  });
}

function flaggedRows(){   // rows with an actionable flag, minus the ones marked проверено
  const out=[]; document.querySelectorAll(".row").forEach(r=>{
    const i=+r.dataset.i; if(lineHasFlag(cur.stressed[i]) && !checked.has(i)) out.push(r);
  });
  return out;
}
// browse cursor: highlight a row WITHOUT entering edit mode, so n/p keep working
function setCurrent(line){
  navLine = line;
  document.querySelectorAll(".row.current").forEach(r=>r.classList.remove("current"));
  if(line!=null && line>=0){ const r=document.querySelector(`.row[data-i="${line}"]`); if(r) r.classList.add("current"); }
}
function jumpFlag(dir){
  if(document.activeElement && document.activeElement.classList && document.activeElement.classList.contains("ed"))
    document.activeElement.blur();                       // leave edit mode so keys go to the document
  const fr = flaggedRows(); if(!fr.length){ setCurrent(-1); return; }
  let idx = fr.findIndex(r=>+r.dataset.i===navLine);
  if(idx<0){                                             // first jump / parked off a flag: pick by viewport
    const y = window.scrollY + innerHeight/2;
    if(dir>0){ idx = fr.findIndex(r=>r.offsetTop>y); if(idx<0) idx = fr.length-1; }
    else { idx = 0; for(let j=0;j<fr.length;j++) if(fr[j].offsetTop < y) idx = j; }
  } else {
    idx = Math.max(0, Math.min(fr.length-1, idx+dir));   // step exactly one flag, clamp at ends
  }
  const t = fr[idx]; setCurrent(+t.dataset.i);
  t.scrollIntoView({block:"center",behavior:"smooth"});  // no .ed focus — stays in browse mode
}
function editCurrent(){   // Enter / click → edit the current flag
  if(navLine<0) return;
  const r=document.querySelector(`.row[data-i="${navLine}"]`); if(r) r.querySelector(".ed").focus();
}
function markValid(){     // ✓ this flag is fine → skip it in nav (persisted), advance
  if(navLine<0) return;
  checked.add(navLine); saveChecked();
  const r=document.querySelector(`.row[data-i="${navLine}"]`); if(r) r.classList.add("done");
  updateStat(); jumpFlag(1);
}

function updateStat(){
  let hom=0, nos=0;
  if(cur) for(const ln of cur.stressed) for(const t of ln.split(/\s+/)){
    const c=classify(t); if(c==="hom") hom++; else if(c==="nostress") nos++;
  }
  const dirty = cur ? cur.dirty.size : 0;
  const done = cur ? checked.size : 0;
  $("#stat").textContent = cur ? `${cur.stressed.length} строк · ${hom} ё-омогр. · ${nos} без удар.`
    + (done?` · ✓${done}`:"") + (dirty?` · ${dirty} правок`:"") : "";
  $("#save").disabled = !dirty;
  const chap = document.querySelector(`.chap[data-name="${cur?.name}"]`);
  if(chap) chap.classList.toggle("dirty", !!dirty);
}

async function save(){
  if(!cur || !cur.dirty.size) return;
  const r = await fetch("/api/save?name="+encodeURIComponent(cur.name),{method:"POST",
    headers:{"Content-Type":"application/json"}, body:JSON.stringify({stressed:cur.stressed})});
  if(r.ok){ cur.dirty.clear(); document.querySelectorAll(".row.changed").forEach(x=>x.classList.remove("changed")); updateStat(); }
  else alert("Ошибка сохранения: "+await r.text());
}

$("#next").onclick=()=>jumpFlag(1);
$("#prev").onclick=()=>jumpFlag(-1);
$("#ok").onclick=markValid;
$("#save").onclick=save;
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey) && e.key==="s"){ e.preventDefault(); save(); return; }
  if(e.target.isContentEditable){                         // editing: Enter/Esc commit & return to browse
    if(e.key==="Enter"||e.key==="Escape"){ e.preventDefault(); e.target.blur(); }
    return;                                               // everything else types normally
  }
  switch(e.key){                                          // browse mode
    case "n": case "j": e.preventDefault(); jumpFlag(1); break;
    case "p": case "k": e.preventDefault(); jumpFlag(-1); break;
    case "v": e.preventDefault(); markValid(); break;
    case " ": if(navLine>=0){ e.preventDefault(); markValid(); } break;  // else let Space scroll
    case "Enter": if(navLine>=0){ e.preventDefault(); editCurrent(); } break;
  }
});
window.addEventListener("beforeunload",e=>{ if(cur&&cur.dirty.size){ e.preventDefault(); e.returnValue=""; }});
loadList();
</script>
</body>
</html>
