# Help page
help:
  title: "Довідка"
  welcome: "Ласкаво просимо до вашої бібліотеки SOPDS"
  intro: "SOPDS віддає ваші електронні та аудіокниги через OPDS і веб. Ось як тут орієнтуватися."
  search:
    title: "Пошук"
    p1: "У рядку пошуку два поля — використовуйте окремо або разом:"
    field1: "шукає в назвах книг"
    field2: "шукає в іменах авторів — імʼя чи прізвище"
    example: "Введіть «дюна» у Назві та «герберт» в Авторі — і одразу потрапите на «Дюну» Френка Герберта."
    p2: "Обидва поля разом звужують результат (назва І автор). Позначте «+опис», щоб шукати ще й в описах книг."
  scope:
    title: "Контекстний пошук"
    p1: "Спершу відкрийте автора, жанр, серію чи мову — і наступний пошук шукатиме лише в цьому контексті."
    example: "Відкрийте автора Стівена Кінга й пошукайте «вежа» — побачите тільки його книги, а не всі підряд."
  filters:
    title: "Фільтри в URL"
    p1: "Для точного відбору додайте параметри просто в адресний рядок:"
    lang: "?lang_pattern=uk — лише українські книги"
    genre: "?genre_pattern=sci — жанри, що містять «sci» (sci-fi, science…)"
    series: "?series_pattern=Silo — серії, у назві яких є «Silo»"
    combine: "Поєднуйте через «&»:"
    example: "/web/new?lang_pattern=uk&genre_pattern=fantasy"
  browse:
    title: "Перегляд"
    p1: "Любите просто гортати? До ваших послуг меню:"
    cat: "структура тек вашої бібліотеки, як її зчитано з диска"
    auth: "список А–Я з переходом углиб за першими літерами"
    genre: "згруповано за категоріями, напр. Художня › Фентезі"
    series: "А–Я, з усіма книгами в порядку читання"
    lang: "усе, згруповане за мовою"
  download:
    title: "Завантаження та формати"
    p1: "Кожна книга завантажується в оригінальному форматі. FB2 ще й конвертується в EPUB на льоту."
    example: "Знайшли FB2, а читалка хоче EPUB? Натисніть кнопку EPUB — SOPDS сконвертує сам."
  opds:
    title: "Доступ через OPDS"
    p1: "Наведіть будь-яку OPDS-читалку на цю адресу — і вся бібліотека зʼявиться просто в застосунку:"
    readers: "Працює з Moon+ Reader, FBReader, KOReader, Calibre та більшістю інших."
  bookshelf:
    title: "Полиця"
    p1: "Натисніть «Додати на полицю» на будь-якій книзі — і вона буде під рукою на вашій особистій полиці, навіть до входу в акаунт."

